<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hallmark Expense Tracker</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #ffffff;
        color: #171717;
      }
      main {
        width: min(28rem, calc(100vw - 2rem));
        padding: 2rem;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        color: #525252;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hallmark Expense Tracker</h1>
      <p>You are offline. Reconnect to continue using the expense tracker.</p>
    </main>
  </body>
</html>
